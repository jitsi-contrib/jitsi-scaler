# ------------------------------------------------------------------------------
# This is a sample config with:
# - 2 HAProxy instances in sync
# - 3 Jitsi shards
# - 3 JVBs in each shard (9 in total)
# - 1 Excalidraw in each shard (3 in total)
# - 1 Etherpad in each shard (3 in total)
# - Jitsi domain is meet.example.com
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# HAPROXY CONFIGURATION
# ------------------------------------------------------------------------------
haproxy:
  enabled: true
  replicaCount: 2

  ingress:
    #enabled: false
    enabled: true
    ingressClassName: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    host: "meet.example.com"
    paths:
      - "/"
    tls:
      #enabled: false
      enabled: true
      secretName: "jitsi-web-tls"

  gateway:
    enabled: false
    gatewayClassName: "envoy-gateway-class"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    host: "meet.example.com"
    paths:
      - "/"
    tls:
      #enabled: false
      enabled: true
      secretName: "jitsi-web-tls"

# ------------------------------------------------------------------------------
# DEFAULT JITSI CONFIGURATION
# ------------------------------------------------------------------------------
.jitsiDefaults: &jitsiDefaults
  publicURL: "https://meet.example.com"

  excalidraw:
    enabled: true

  etherpad:
    enabled: true

  jvb:
    replicaCount: 1
    portRangeSize: 3

# ------------------------------------------------------------------------------
# SHARD CONFIGURATION
# ------------------------------------------------------------------------------
shard0:
  enabled: true
  <<: *jitsiDefaults

shard1:
  enabled: true
  <<: *jitsiDefaults
 
shard2:
  enabled: true
  <<: *jitsiDefaults
