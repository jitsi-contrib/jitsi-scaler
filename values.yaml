# ------------------------------------------------------------------------------
# GLOBAL CONFIGURATION
# ------------------------------------------------------------------------------
global:
  clusterDomain: cluster.local
  podLabels: {}
  podAnnotations: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname
  # template.
  name:

# ------------------------------------------------------------------------------
# DEFAULT JITSI CONFIGURATION
#
# This master template ensures all Jitsi shards share the same base settings.
#
# See values.yaml in jitsi-helm for possible values:
#   https://github.com/jitsi-contrib/jitsi-helm/blob/main/values.yaml
# ------------------------------------------------------------------------------
.jitsiDefaults: &jitsiDefaults
  publicURL: ""
  turnHost: ""
  tz: "UTC"

  websockets:
    colibri:
      enabled: false
    xmpp:
      enabled: true

  web:
    gateway:
      enabled: false
    ingress:
      enabled: false

  jvb:
    replicaCount: 1
    portRangeSize: 2
    # The first port of the range (UDPPort) is located within each shard.

    useHostPort: true
    service:
      enabled: false

  octo:
    enabled: true

# ------------------------------------------------------------------------------
# SHARD CONFIGURATION
#
# - Toggle shards 'true' to deploy capacity.
# - Each enabled shard will deploy a full Jitsi stack.
# - Shard0 contains also auxiliary services if they are enabled unlike the other
#   shards.
# ------------------------------------------------------------------------------
shard0:
  # Dont disable shard0 if there are enabled aux services.
  enabled: true

  <<: *jitsiDefaults
  UDPPort: 10000

  # Auxiliary services
  coturn:
    enabled: false
  excalidraw:
    enabled: false
  etherpad:
    enabled: false

shard1:
  enabled: true

  <<: *jitsiDefaults
  UDPPort: 10100

shard2:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10200

shard3:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10300

shard4:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10400

shard5:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10500

shard6:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10600

shard7:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10700

shard8:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10800

shard9:
  enabled: false

  <<: *jitsiDefaults
  UDPPort: 10900

# ------------------------------------------------------------------------------
# HAPROXY CONFIGURATION
#
# This is the entry point for all users. It handles room-based sticky routing.
# ------------------------------------------------------------------------------
haproxy:
  enabled: true
  replicaCount: 2

  image:
    repository: haproxy
    tag: "3.2-alpine"
    pullPolicy: IfNotPresent
    pullSecrets: []

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  gateway:
    enabled: false
    gatewayClassName: envoy-gateway-class
    annotations: {}
    host: "jitsi.local"
    paths:
      - "/"
    tls:
      enabled: false
      secretName: jitsi-web-tls

  ingress:
    enabled: false
    ingressClassName: nginx
    annotations: {}
    host: "jitsi.local"
    paths:
      - "/"
    tls:
      enabled: false
      secretName: jitsi-web-tls

  livenessProbe:
    httpGet:
      path: /
      port: 8080

  readinessProbe:
    httpGet:
      path: /
      port: 8080

  affinity: {}
  annotations: {}
  extraEnvs: {}
  extraVolumes: []
  extraVolumeMounts: []
  hostAliases: []
  labels: {}
  nodeSelector: {}
  resources: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  tolerations: []
