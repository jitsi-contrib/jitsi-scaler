{{- if and
       .Values.haproxy.enabled
       .Values.haproxy.gateway.enabled
-}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "jitsi-scaler.haproxy.fullname" . }}
  labels:
    {{- include "jitsi-scaler.haproxy.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "jitsi-scaler.haproxy.fullname" . }}
      kind: Gateway
  hostnames:
    - {{ .Values.haproxy.gateway.host | quote }}
  rules:
    - matches:
        {{- range .Values.haproxy.gateway.paths }}
        - path:
            type: PathPrefix
            value: {{ . | quote }}
        {{- end }}
      backendRefs:
        - name: {{ include "jitsi-scaler.haproxy.fullname" . }}
          port: {{ .Values.haproxy.service.port }}
{{- end }}
